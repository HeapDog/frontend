name: Build and Deploy Frontend Custom Image

on:
  push:
    branches:
      - main
      - dev

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"


jobs:
  build-and-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine Next.js Build Args
        id: build_args
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "base_url=https://heapdog.app" >> $GITHUB_OUTPUT
            echo "sse_server=https://heapdog.app" >> $GITHUB_OUTPUT
            echo "app_env=production" >> $GITHUB_OUTPUT
          else
            echo "base_url=https://dev.heapdog.app" >> $GITHUB_OUTPUT
            echo "sse_server=https://dev.heapdog.app" >> $GITHUB_OUTPUT
            echo "app_env=development" >> $GITHUB_OUTPUT
          fi

      - name: Extract Metadata (Tags, Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/heapdog/frontend
          tags: |
            type=sha,prefix=sha-,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_BASE_URL=${{ steps.build_args.outputs.base_url }}
            NEXT_PUBLIC_SSE_SERVER=${{ steps.build_args.outputs.sse_server }}
            NEXT_PUBLIC_APP_ENV=${{ steps.build_args.outputs.app_env }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  promote:
    name: Promote to GitOps
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Determine Target Environment
        id: env
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "env=prod" >> $GITHUB_OUTPUT
          else
            echo "env=dev" >> $GITHUB_OUTPUT
          fi

      - name: Setup SSH for k8s Repo Push
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.K8S_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Clone k8s Manifests Repository
        run: |
          git clone git@github.com:HeapDog/k8s.git
          cd k8s
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Setup Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update Image Tag in Kustomize Overlay
        run: |
          cd k8s/apps/overlays/${{ steps.env.outputs.env }}
          kustomize edit set image ghcr.io/heapdog/frontend=ghcr.io/heapdog/frontend:sha-${{ github.sha }}
          
      - name: Commit and Push Manifest Changes
        run: |
          cd k8s
          git add apps/overlays/${{ steps.env.outputs.env }}/kustomization.yaml
          git diff-index --quiet HEAD || git commit -m "chore(gitops): promote frontend to sha-${{ github.sha }} [skip ci]"
          git push origin main
